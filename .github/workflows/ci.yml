name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go Gateway Tests ──────────────────────────────────────────────────
  gateway-tests:
    name: Gateway Tests (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: gateway/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -count=1 -race ./...

      - name: Build binary
        run: go build -o metasource-gateway .

  # ── Python AI Service Tests ───────────────────────────────────────────
  ai-service-tests:
    name: AI Service Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend Lint & Build ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080

  # ── Docker Build Verification ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [gateway-tests, ai-service-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Verify Kubernetes manifests syntax
        run: |
          for f in k8s/*.yaml; do
            echo "Checking $f..."
            python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" 2>&1 || exit 1
          done
