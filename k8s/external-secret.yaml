# AWS Secrets Manager -> K8s Secret sync via External Secrets Operator
#
# Prerequisites:
#   1. Install ESO: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   2. Create the AWS secret: aws secretsmanager create-secret --name meta-source/prod --secret-string '<json>'
#   3. Create a SecretStore or ClusterSecretStore with AWS credentials
#
# For clusters without ESO, use k8s/create-secrets.sh to create K8s secrets directly.

---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: meta-test
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secret
            key: AWS_ACCESS_KEY_ID
          secretAccessKeySecretRef:
            name: aws-secret
            key: AWS_SECRET_ACCESS_KEY

---
# Database credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: meta-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: db-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: meta-source/prod
        property: DB_HOST
    - secretKey: DB_PORT
      remoteRef:
        key: meta-source/prod
        property: DB_PORT
    - secretKey: DB_USER
      remoteRef:
        key: meta-source/prod
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: meta-source/prod
        property: DB_PASSWORD
    - secretKey: DB_NAME
      remoteRef:
        key: meta-source/prod
        property: DB_NAME
    - secretKey: DATABASE_URL
      remoteRef:
        key: meta-source/prod
        property: DATABASE_URL

---
# Auth credentials (NextAuth, Google OAuth)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-secret
  namespace: meta-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: auth-secret
    creationPolicy: Owner
  data:
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: meta-source/prod
        property: NEXTAUTH_SECRET
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: meta-source/prod
        property: GOOGLE_CLIENT_ID
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: meta-source/prod
        property: GOOGLE_CLIENT_SECRET
