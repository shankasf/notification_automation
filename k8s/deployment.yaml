# ============================================================
# Deployments for MetaSource (3 microservices)
# ============================================================
# All three services run in the meta-test namespace on k3s.
# Source code is mounted from the host via hostPath volumes
# (dev setup — in production, use container images instead).
#
# Services:
#   1. meta-frontend  — Next.js 15 UI (port 3000)
#   2. meta-gateway   — Go/Gin API gateway (port 8080)
#   3. meta-ai        — Python FastAPI AI service (port 8000)
# ============================================================

# ---- 1. Frontend (Next.js 15) ----
# Serves the dashboard UI, handles Google OAuth via NextAuth,
# and manages the Prisma schema/migrations for PostgreSQL.
# The initContainer runs DB migrations before the app starts
# to ensure the schema is up to date on every deploy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-frontend
  namespace: meta-test
  labels:
    app: meta-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meta-frontend
  template:
    metadata:
      labels:
        app: meta-frontend
    spec:
      # Run database migrations before starting the app
      # This ensures schema is always in sync with code
      initContainers:
        - name: run-migrations
          image: node:20-bookworm
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["sh", "-c", "npm install --include=dev --ignore-scripts && npx prisma generate && npx prisma migrate deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          volumeMounts:
            - name: frontend-source
              mountPath: /app
      containers:
        - name: frontend
          image: node:20-bookworm
          imagePullPolicy: IfNotPresent
          workingDir: /app
          # Builds and starts Next.js in production mode
          command: ["sh", "-c", "npm install --include=dev --ignore-scripts && npx prisma generate && npm run build && npm run start"]
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"   # Prevent OOM during Next.js build
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"                            # Opt out of Vercel telemetry
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: NEXTAUTH_SECRET
            - name: AI_SERVICE_URL
              value: "http://meta-ai:8000"         # Internal K8s DNS for AI service
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: "us-east-1"
            - name: SNS_ADMIN_EMAIL
              value: ""
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1.5Gi"              # Next.js build is memory-hungry
              cpu: "500m"
          volumeMounts:
            - name: frontend-source
              mountPath: /app
      volumes:
        - name: frontend-source
          hostPath:
            path: /home/ubuntu/apps/meta_test/frontend   # Dev: mount source from host
            type: Directory
---
# ---- 2. Gateway (Go/Gin) ----
# Central API server handling all REST endpoints, WebSocket hub,
# SQS queue producers/consumers, change tracking, and notification routing.
# Connects to PostgreSQL directly (raw SQL) and proxies AI requests
# to the Python service. Lightweight — only needs 128Mi base memory.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-gateway
  namespace: meta-test
  labels:
    app: meta-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meta-gateway
  template:
    metadata:
      labels:
        app: meta-gateway
    spec:
      containers:
        - name: gateway
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          workingDir: /app
          # Install CA certs for HTTPS calls to AWS services, then run the compiled Go binary
          command: ["sh", "-c", "apt-get update && apt-get install -y ca-certificates && update-ca-certificates && ./server"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PYTHON_BACKEND
              value: "http://meta-ai:8000"        # Internal K8s DNS for AI service
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_NAME
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: NEXTAUTH_SECRET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: "us-east-1"
            - name: SNS_ADMIN_EMAIL
              value: ""
          resources:
            requests:
              memory: "128Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: gateway-source
              mountPath: /app
      volumes:
        - name: gateway-source
          hostPath:
            path: /home/ubuntu/apps/meta_test/gateway
            type: Directory
---
# ---- 3. AI Service (Python FastAPI) ----
# Handles all AI/ML operations: LLM chat (GPT-4.1), anomaly detection,
# change summarization, data upload pipeline, and guardrails enforcement.
# Internal-only — never exposed to the internet directly. The Go gateway
# proxies all /api/ai/* requests here with JWT header forwarding.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-ai
  namespace: meta-test
  labels:
    app: meta-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meta-ai
  template:
    metadata:
      labels:
        app: meta-ai
    spec:
      containers:
        - name: ai
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          workingDir: /app
          # Install Python deps and start FastAPI with hot-reload (dev mode)
          command: ["sh", "-c", "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"]
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
            - name: SMTP_HOST
              value: "email-smtp.us-east-1.amazonaws.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_FROM
              value: "noreply@callsphere.tech"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PASS
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          volumeMounts:
            - name: ai-source
              mountPath: /app
      volumes:
        - name: ai-source
          hostPath:
            path: /home/ubuntu/apps/meta_test/ai-service
            type: Directory
