apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meta-test-ingress-https
  namespace: meta-test
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - meta.callsphere.tech
      secretName: meta-tls
  rules:
    - host: meta.callsphere.tech
      http:
        paths:
          - path: /api/sns
            pathType: Prefix
            backend:
              service:
                name: meta-frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: meta-gateway
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: meta-gateway
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: meta-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meta-frontend
                port:
                  number: 3000
