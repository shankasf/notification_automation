# ============================================================
# Ingress: HTTPS routing for meta.callsphere.tech
# ============================================================
# Traefik IngressRoute with automatic TLS via cert-manager
# (Let's Encrypt production). Routes requests to the correct
# backend service based on URL path.
#
# Routing logic (order matters — most specific paths first):
#   /api/auth/*  -> Frontend  (NextAuth OAuth callbacks must
#                               stay on the same origin as the UI)
#   /api/sns/*   -> Frontend  (SNS setup uses AWS SDK from Next.js)
#   /api/*       -> Gateway   (all other API endpoints)
#   /ws/*        -> Gateway   (WebSocket connections for live updates)
#   /health      -> Gateway   (k8s liveness/readiness probe)
#   /*           -> Frontend  (all page routes, static assets)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meta-test-ingress-https
  namespace: meta-test
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod       # Auto-provision TLS cert from Let's Encrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure  # HTTPS only (port 443)
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - meta.callsphere.tech
      secretName: meta-tls         # cert-manager stores the TLS cert here
  rules:
    - host: meta.callsphere.tech
      http:
        paths:
          # NextAuth routes must go to Frontend (same origin as OAuth redirect)
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: meta-frontend
                port:
                  number: 3000
          # SNS setup route uses AWS SDK initialized in Next.js
          - path: /api/sns
            pathType: Prefix
            backend:
              service:
                name: meta-frontend
                port:
                  number: 3000
          # All other API routes go to Go gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: meta-gateway
                port:
                  number: 8080
          # WebSocket connections for real-time dashboard updates
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: meta-gateway
                port:
                  number: 8080
          # Health check endpoint for monitoring
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: meta-gateway
                port:
                  number: 8080
          # Catch-all: UI pages and static assets
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meta-frontend
                port:
                  number: 3000
